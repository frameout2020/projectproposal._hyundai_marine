        <section class="login-panel" aria-labelledby="login-title">
          <h1 id="login-title" class="login-panel__title">차세대 발행물 시스템</h1>

          <form class="login-form" novalidate>
            <div class="field">
              <label class="a11y-hidden" for="login-id">아이디</label>
              <input
                id="login-id"
                class="field__input"
                type="text"
                name="login_id"
                autocomplete="username"
                placeholder="아이디를 입력해주세요."
              />
            </div>

            <div class="field">
              <label class="a11y-hidden" for="login-password">비밀번호</label>
              <input
                id="login-password"
                class="field__input"
                type="password"
                name="login_password"
                autocomplete="current-password"
                placeholder="비밀번호를 입력해주세요."
              />
            </div>

            <div class="login-form__meta">
              <label class="check-field">
                <input class="check-field__input" type="checkbox" name="remember_id" />
                <span class="check-field__box" aria-hidden="true"></span>
                <span class="check-field__label">아이디 저장</span>
              </label>

              <a class="login-form__help" href="#">아이디/비밀번호 찾기</a>
            </div>

            <button class="login-form__submit" type="submit">로그인</button>
          </form>
        </section>
      </div>
    </main>
    <script src="./assets/js/main.js"></script>

</html>
